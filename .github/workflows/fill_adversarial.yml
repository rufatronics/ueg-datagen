name: Fill Adversarial Class

on:
  workflow_dispatch:

jobs:
  fill-adversarial:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests huggingface_hub datasets

      - name: Fill adversarial class
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 - <<'EOF'
          import os, json, time, shutil, tempfile, requests
          from huggingface_hub import HfApi

          TOKEN  = os.environ["HF_TOKEN"]
          REPO   = "rufatronics/ueg-training-data"
          TARGET = 8000
          api    = HfApi(token=TOKEN)

          # -------------------------------------------------------------------
          # Fetch from neuralchemy — filter label=1 (attacks only)
          # -------------------------------------------------------------------
          print("[FETCH] neuralchemy/Prompt-injection-dataset")
          from datasets import load_dataset

          ds = load_dataset(
            "neuralchemy/Prompt-injection-dataset",
            "full",
            split="train",
            token=TOKEN,
          )

          all_examples = []
          seen = set()

          for row in ds:
            if row.get("label") != 1:
              continue
            text = row.get("text", "").strip()
            if not text or len(text) < 10 or text in seen:
              continue
            seen.add(text)
            all_examples.append({
              "text":               text,
              "intent_class_id":    2,
              "intent_class_label": "adversarial_probe",
              "tier":               "1",
              "language_iso":       "en",
              "resource_class":     "hr_global",
              "generated_by":       "hf:neuralchemy/Prompt-injection-dataset",
              "split":              "train",
            })
            if len(all_examples) >= TARGET:
              break

          print(f"[FETCH] Got {len(all_examples)} attack examples")

          if not all_examples:
            print("[ERROR] Nothing fetched — aborting")
            exit(1)

          # -------------------------------------------------------------------
          # Write JSONL
          # -------------------------------------------------------------------
          tmp_dir  = tempfile.mkdtemp()
          data_dir = os.path.join(tmp_dir, "data")
          os.makedirs(data_dir, exist_ok=True)

          jsonl_path = os.path.join(data_dir, "class_02_adversarial_probe.jsonl")
          with open(jsonl_path, "w", encoding="utf-8") as f:
            for ex in all_examples:
              f.write(json.dumps(ex, ensure_ascii=False) + "\n")

          print(f"[WRITE] {len(all_examples)} examples written")

          # -------------------------------------------------------------------
          # Load and update progress.json via raw requests (more reliable)
          # -------------------------------------------------------------------
          try:
            r = requests.get(
              f"https://huggingface.co/datasets/{REPO}/resolve/main/progress.json",
              headers={"Authorization": f"Bearer {TOKEN}"},
              timeout=30,
            )
            state = r.json()
            print("[STATE] Loaded progress.json")
          except Exception as e:
            print(f"[STATE] Failed to load progress.json: {e} — aborting")
            shutil.rmtree(tmp_dir, ignore_errors=True)
            exit(1)

          # Update class 02 count and recalculate total from scratch
          state["class_counts"]["2"]   = len(all_examples)
          state["class_complete"]["2"] = len(all_examples) >= TARGET
          state["total_generated"]     = sum(state["class_counts"].values())

          progress_path = os.path.join(tmp_dir, "progress.json")
          with open(progress_path, "w", encoding="utf-8") as f:
            json.dump(state, f, indent=2)

          print(f"[STATE] class 02: {len(all_examples)} | "
                f"complete: {state['class_complete']['2']} | "
                f"total: {state['total_generated']:,}")

          # -------------------------------------------------------------------
          # Upload — wait first to avoid rate limit from concurrent pipeline
          # -------------------------------------------------------------------
          print("[PUSH] Waiting 60s before upload...")
          time.sleep(60)

          for attempt in range(5):
            try:
              api.upload_folder(
                folder_path=tmp_dir,
                repo_id=REPO,
                repo_type="dataset",
                commit_message=(
                  f"Fill adversarial class: {len(all_examples)} examples | "
                  f"total: {state['total_generated']:,}"
                ),
              )
              print(f"\n[DONE] ✓ {len(all_examples)} adversarial examples pushed")
              print(f"[DONE] Dashboard updated — total: {state['total_generated']:,}")
              shutil.rmtree(tmp_dir, ignore_errors=True)
              break
            except Exception as e:
              if "429" in str(e):
                wait = 900
                print(f"[PUSH] Rate limited — waiting {wait}s (attempt {attempt+1}/5)")
                time.sleep(wait)
              else:
                print(f"[PUSH] Attempt {attempt+1} failed: {e}")
                time.sleep(30)
          EOF
